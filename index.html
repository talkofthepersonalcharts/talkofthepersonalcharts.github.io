<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Talk of the Personal Charts</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f3f4f6;
    color: #111;
}

/* TOP BAR */
.topbar {
    display: flex;
    align-items: center;
    padding: 18px 26px;
    background: #0f0f10;
    color: white;
}

.logo {
    display: flex;
    align-items: center;
    gap: 12px;
}

.logo img {
    width: 38px;
    height: 38px;
    border-radius: 8px;
    object-fit: cover;
    background: #333;
}

.logo span {
    font-size: 16px;
    font-weight: 700;
}

/* LAYOUT */
.container {
    max-width: 980px;
    margin: 40px auto;
    padding: 0 20px;
}

/* 3x2 GRID */
.grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
}

/* CARD */
.card {
    background: white;
    border-radius: 14px;
    padding: 16px;
    text-decoration: none;
    color: inherit;
    border: 1px solid #e6e6e6;
    transition: 0.15s ease;
}

.card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 18px rgba(0,0,0,0.08);
}

/* CARD HEADER */
.card-top {
    display: flex;
    align-items: center;
    gap: 12px;
}

/* PROFILE */
.pfp {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    object-fit: cover;
    background: #ddd;
}

/* TEXT */
.name {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
}

.top-song {
    font-size: 12px;
    color: #666;
}

/* EMPTY */
.empty {
    opacity: 0.45;
    background: #fafafa;
}

.empty:hover {
    transform: none;
    box-shadow: none;
}
</style>
</head>

<body>

<div class="topbar">
    <div class="logo">
        <img src="https://via.placeholder.com/60" alt="logo">
        <span>Talk of the Personal Charts</span>
    </div>
</div>

<div class="container">

    <div class="grid">

        <!-- RHYTHM -->
        <a class="card" href="/rhythm">
            <div class="card-top">
                <img class="pfp" src="rhythm.jpg">
                <div>
                    <div class="name">Rhythm</div>
                    <div class="top-song">#1: I Follow Rivers – Lykke Li</div>
                </div>
            </div>
        </a>

        <!-- SLOT 2 -->
        <div class="card empty">
            <div class="card-top">
                <img class="pfp" src="https://via.placeholder.com/100">
                <div>
                    <div class="name">Slot 2</div>
                    <div class="top-song">No chart yet</div>
                </div>
            </div>
        </div>

        <!-- SLOT 3 -->
        <div class="card empty">
            <div class="card-top">
                <img class="pfp" src="https://via.placeholder.com/100">
                <div>
                    <div class="name">Slot 3</div>
                    <div class="top-song">No chart yet</div>
                </div>
            </div>
        </div>

        <!-- SLOT 4 -->
        <div class="card empty">
            <div class="card-top">
                <img class="pfp" src="https://via.placeholder.com/100">
                <div>
                    <div class="name">Slot 4</div>
                    <div class="top-song">No chart yet</div>
                </div>
            </div>
        </div>

        <!-- SLOT 5 -->
        <div class="card empty">
            <div class="card-top">
                <img class="pfp" src="https://via.placeholder.com/100">
                <div>
                    <div class="name">Slot 5</div>
                    <div class="top-song">No chart yet</div>
                </div>
            </div>
        </div>

        <!-- SLOT 6 -->
        <div class="card empty">
            <div class="card-top">
                <img class="pfp" src="https://via.placeholder.com/100">
                <div>
                    <div class="name">Slot 6</div>
                    <div class="top-song">No chart yet</div>
                </div>
            </div>
        </div>

    </div>

</div>

</body>
</html>
