<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Personal Charts Archive</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #f4f4f4;
}

header {
    background: #111;
    color: white;
    padding: 18px;
    font-size: 20px;
    font-weight: bold;
}

.topbar {
    display: flex;
    justify-content: space-between;
    max-width: 1100px;
    margin: 10px auto;
    padding: 10px;
}

.week-controls button {
    padding: 8px 12px;
    border: none;
    background: #111;
    color: white;
    cursor: pointer;
}

.week-controls button:disabled {
    background: #777;
}

.date {
    font-weight: bold;
    font-size: 18px;
}

.container {
    max-width: 1100px;
    margin: 0 auto 40px;
    background: white;
}

.chart-header, .row {
    display: grid;
    grid-template-columns: 60px 60px 1fr 120px;
    align-items: center;
}

.chart-header {
    padding: 10px;
    background: #eaeaea;
    font-size: 12px;
    font-weight: bold;
}

.row {
    padding: 10px;
    border-bottom: 1px solid #eee;
}

.rank {
    text-align: center;
    font-weight: bold;
    font-size: 18px;
}

.cover img {
    width: 50px;
    height: 50px;
    object-fit: cover;
    border-radius: 4px;
    background: #ddd;
}

.song {
    display: flex;
    flex-direction: column;
}

.title {
    font-weight: bold;
}

.artist {
    font-size: 13px;
    color: #666;
}

.movement {
    text-align: center;
    font-weight: bold;
}

.up { color: green; }
.down { color: red; }
.new { color: blue; }
</style>
</head>

<body>

<header>PERSONAL CHART ARCHIVE</header>

<div class="topbar">
    <div class="week-controls">
        <button onclick="changeWeek(-1)" id="prevBtn">← Previous</button>
        <button onclick="changeWeek(1)" id="nextBtn">Next →</button>
    </div>
    <div class="date" id="dateLabel"></div>
</div>

<div class="container">
    <div class="chart-header">
        <div>#</div>
        <div></div>
        <div>Song</div>
        <div>Movement</div>
    </div>
    <div id="chart"></div>

const data = {
"17/05/26": week17,
"24/05/26": week24,
"31/05/26": week31
};

function id(s){return s.t+"||"+s.a}

function pos(list){
const m={}
list.forEach((s,i)=>m[id(s)]=i+1)
return m
}

function move(prev,k,p){
if(!prev) return "NEW"
const x=prev[k]
if(!x) return "NEW"
const d=x-p
if(d===0) return "—"
return d>0?"↑ "+d:"↓ "+Math.abs(d)
}

let i=2

function render(){
const w=weeks[i]

document.getElementById("dateLabel").innerText=w
document.getElementById("prevBtn").disabled=i===0
document.getElementById("nextBtn").disabled=i===weeks.length-1

const el=document.getElementById("chart")
el.innerHTML=""

const list=data[w]
const prev=data[weeks[i-1]]
const pm=prev?pos(prev):null

for(let n=0;n<list.length;n++){
const s=list[n]

let m=move(pm,id(s),n+1)

let cls="movement"
if(m.startsWith("↑")) cls+=" up"
if(m.startsWith("↓")) cls+=" down"
if(m==="NEW") cls+=" new"

const row=document.createElement("div")
row.className="row"

row.innerHTML=`
<div class="rank">${n+1}</div>
<div class="cover"><img src="${s.c}"></div>
<div class="song">
<div class="title">${s.t}</div>
<div class="artist">${s.a}</div>
</div>
<div class="${cls}">${m}</div>
`

el.appendChild(row)
}
}

function changeWeek(d){i+=d;render()}

render()
