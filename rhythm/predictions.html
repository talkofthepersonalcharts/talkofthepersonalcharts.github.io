<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rhythm — Predictions</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background-color:#ffe4f0;background-image:radial-gradient(circle,#ff9ed2 1px,transparent 1px),radial-gradient(circle,#ffb3e0 1px,transparent 1px);background-size:28px 28px,14px 14px;background-position:0 0,7px 7px;min-height:100vh;color:#1a0533}

header{background:#7c3aed;border-bottom:4px solid #4c1d95;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px}
.back-link{font-family:'Fredoka One',cursive;font-size:14px;color:#c4b5fd;text-decoration:none;display:flex;align-items:center;gap:6px}
.back-link:hover{color:#fff}
.header-title{font-family:'Fredoka One',cursive;font-size:20px;color:#fff}
.header-right{width:80px}

.ticker-wrap{background:#4c1d95;border-bottom:3px solid #3b0764;overflow:hidden;white-space:nowrap;padding:7px 0;position:relative}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:50px;z-index:2;pointer-events:none}
.ticker-wrap::before{left:0;background:linear-gradient(to right,#4c1d95,transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(to left,#4c1d95,transparent)}
.ticker-track{display:inline-flex;animation:ticker 30s linear infinite}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:10px;padding:0 28px;font-size:12px;font-weight:700;letter-spacing:.06em;color:#e9d5ff;text-transform:uppercase;white-space:nowrap}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:#c084fc;flex-shrink:0}

.hero{text-align:center;padding:36px 20px 24px}
.hero-eyebrow{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.14em;color:#d946ef;margin-bottom:10px}
.hero h1{font-family:'Fredoka One',cursive;font-size:clamp(28px,5vw,48px);color:#4c1d95;text-shadow:3px 3px 0 #c084fc;margin-bottom:8px;line-height:1.1}
.hero p{font-size:14px;font-weight:600;color:#6d28d9}

/* WEEK SELECTOR */
.week-selector-wrap{max-width:860px;margin:0 auto 20px;padding:0 20px}
.week-selector{background:#fff;border:3px solid #7c3aed;border-radius:14px;box-shadow:4px 4px 0 #4c1d95;padding:14px 18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.week-selector-label{font-family:'Fredoka One',cursive;font-size:15px;color:#4c1d95;white-space:nowrap}
.week-tabs{display:flex;gap:8px;flex-wrap:wrap}
.week-tab{padding:6px 16px;border:2px solid #c4b5fd;border-radius:999px;background:#f3e8ff;font-size:12px;font-weight:800;color:#4c1d95;cursor:pointer;transition:all .15s;white-space:nowrap}
.week-tab:hover{background:#ede9fe;border-color:#a78bfa}
.week-tab.active{background:#7c3aed;border-color:#4c1d95;color:#fff;box-shadow:2px 2px 0 #4c1d95}

/* MAIN GRID */
.predictions-grid{max-width:860px;margin:0 auto 60px;padding:0 20px;display:grid;grid-template-columns:1fr 1fr;gap:20px}
@media(max-width:620px){.predictions-grid{grid-template-columns:1fr}}

/* PREDICTION BOX */
.pred-box{background:#fff;border:3px solid #7c3aed;border-radius:16px;box-shadow:5px 5px 0 #4c1d95;overflow:hidden}

.pred-box-header{background:#7c3aed;padding:14px 18px;display:flex;align-items:center;gap:10px}
.pred-box-emoji{font-size:22px;line-height:1}
.pred-box-info{}
.pred-box-title{font-family:'Fredoka One',cursive;font-size:18px;color:#fff}
.pred-box-sub{font-size:11px;font-weight:700;color:#ddd6fe;margin-top:1px}

.pred-box-meta{background:#4c1d95;padding:8px 18px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.pred-meta-badge{background:#7c3aed;color:#e9d5ff;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;padding:3px 10px;border-radius:999px;border:1px solid #c4b5fd}

/* PREDICTION ROWS */
.pred-list{padding:0}
.pred-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:2px solid #f3e8ff;transition:background .12s}
.pred-row:last-child{border-bottom:none}
.pred-row:hover{background:#faf5ff}
.pred-row.top1{background:#fef9c3!important}
.pred-row.top2{background:#f0fdf4!important}
.pred-row.top3{background:#fff7ed!important}

.pred-num{font-family:'Fredoka One',cursive;font-size:22px;color:#4c1d95;min-width:32px;text-align:center;flex-shrink:0}
.pred-row.top1 .pred-num{color:#854d0e;font-size:24px}
.pred-row.top2 .pred-num{color:#166534;font-size:23px}
.pred-row.top3 .pred-num{color:#9a3412;font-size:23px}

.pred-cover{width:44px;height:44px;border-radius:8px;border:2px solid #ddd6fe;object-fit:cover;background:#f3e8ff;flex-shrink:0}
.pred-info{flex:1;min-width:0}
.pred-title{font-weight:800;font-size:14px;color:#1a0533;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pred-artist{font-size:12px;font-weight:600;color:#7c3aed}
.pred-note{font-size:11px;font-weight:700;color:#a78bfa;margin-top:2px;font-style:italic}

/* EMPTY SLOT */
.pred-row.empty-slot .pred-num{color:#ddd6fe}
.pred-row.empty-slot .pred-title{color:#c4b5fd;font-style:italic;font-weight:600}
.pred-row.empty-slot .pred-cover{opacity:.3}

/* NO PREDICTIONS YET */
.no-preds{padding:40px 20px;text-align:center}
.no-preds .emoji{font-size:40px;margin-bottom:12px}
.no-preds h3{font-family:'Fredoka One',cursive;font-size:20px;color:#4c1d95;margin-bottom:6px}
.no-preds p{font-size:13px;font-weight:600;color:#a78bfa}

/* COMPARISON BOX */
.comparison-wrap{max-width:860px;margin:-10px auto 40px;padding:0 20px}
.comparison-box{background:#fff;border:3px solid #c084fc;border-radius:16px;box-shadow:4px 4px 0 #a78bfa;overflow:hidden}
.comparison-header{background:#c084fc;padding:12px 18px;display:flex;align-items:center;gap:10px}
.comparison-header-title{font-family:'Fredoka One',cursive;font-size:17px;color:#3b0764}
.comparison-body{padding:14px 18px;font-size:13px;font-weight:600;color:#4c1d95;line-height:1.7}
.comparison-body.empty{color:#a78bfa;font-style:italic}

.section-label{max-width:860px;margin:0 auto 14px;padding:0 20px;display:flex;align-items:center;gap:12px}
.section-label span{font-family:'Fredoka One',cursive;font-size:18px;color:#7c3aed;white-space:nowrap}
.section-line{flex:1;height:2px;background:repeating-linear-gradient(90deg,#c084fc 0,#c084fc 6px,transparent 6px,transparent 12px)}

footer{border-top:3px solid #7c3aed;background:#4c1d95;padding:14px 28px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#c4b5fd}
</style>
</head>
<body>
<header>
  <a class="back-link" href="index.html">← back</a>
  <div class="header-title">🔮 Predictions</div>
  <div class="header-right"></div>
</header>
<div class="ticker-wrap"><div class="ticker-track" id="ticker"></div></div>

<div class="hero">
  <div class="hero-eyebrow">🔮 Predictions Centre</div>
  <h1>What's coming next?</h1>
  <p>Early & late week predictions for upcoming charts</p>
</div>

<!-- WEEK SELECTOR -->
<div class="week-selector-wrap">
  <div class="week-selector">
    <span class="week-selector-label">Predicting for:</span>
    <div class="week-tabs" id="weekTabs"></div>
  </div>
</div>

<!-- PREDICTIONS GRID -->
<div class="section-label"><span id="sectionWeekLabel">Week of 7 Jun 2026</span><div class="section-line"></div></div>
<div class="predictions-grid" id="predsGrid"></div>

<!-- COMPARISON NOTE -->
<div class="comparison-wrap" id="comparisonWrap" style="display:none">
  <div class="comparison-box">
    <div class="comparison-header">
      <span style="font-size:18px">📝</span>
      <span class="comparison-header-title">How did we do?</span>
    </div>
    <div class="comparison-body" id="comparisonBody"></div>
  </div>
</div>

<footer>Talk of the Personal Charts &nbsp;·&nbsp; Updated Every Week</footer>

<script>
// ============================================================
//  PREDICTION WEEKS REGISTRY
//  To add a new prediction week, add one entry to PRED_WEEKS.
//  chart_date: the actual chart date being predicted for
//  early: array of up to 5 entries  { t, a, c, note? }
//  late:  array of up to 10 entries { t, a, c, note? }
//  comparison: optional string shown after the chart drops
// ============================================================
const PRED_WEEKS = [
  {
    id: "2026-06-07",
    label: "7 Jun 2026",
    chart_date: "2026-06-07",
    early: [
      // ✏️ ADD YOUR EARLY PREDICTIONS HERE (top 5 only)
      // { t: "Song Title", a: "Artist", c: "https://cover-url.jpg", note: "optional comment" },
      { t: "Turn it up", a: "PinkPantheress", c: "https://upload.wikimedia.org/wikipedia/en/f/ff/PinkPantheress_-_Turn_it_up.png" },
      { t: "I Follow Rivers", a: "Lykke Li", c: "https://upload.wikimedia.org/wikipedia/en/7/7c/Lykke_Li_-_I_Follow_Rivers_single_cover.jpg" },
      { t: "anthems", a: "Charli xcx", c: "https://i.scdn.co/image/ab67616d00001e025b8ef3c9b30d307df5245bfa" },
      { t: "Church Girl", a: "Beyoncé", c: "https://upload.wikimedia.org/wikipedia/en/a/ad/Beyonc%C3%A9_-_Renaissance.png" },
      { t: "Believe", a: "Cher", c: "https://upload.wikimedia.org/wikipedia/en/f/f9/Cher_-_Believe.png" },
    ],
    late: [
      // ✏️ ADD YOUR LATE WEEK PREDICTIONS HERE (top 10)
      { t: "Turn it up", a: "PinkPantheress", c: "https://upload.wikimedia.org/wikipedia/en/f/ff/PinkPantheress_-_Turn_it_up.png" },
      // ✏️ slots 6-10 below:
      // { t: "Song", a: "Artist", c: "cover-url" },
    ],
    comparison: null  // ✏️ fill this in once the chart drops! e.g. "Nailed #1! Missed on Cher though..."
  },

  // ============================================================
  // TEMPLATE — copy this block to add a new prediction week:
  // {
  //   id: "2026-06-14",
  //   label: "14 Jun 2026",
  //   chart_date: "2026-06-14",
  //   early: [
  //     { t: "Song", a: "Artist", c: "cover-url", note: "optional" },
  //   ],
  //   late: [
  //     { t: "Song", a: "Artist", c: "cover-url" },
  //   ],
  //   comparison: null
  // },
  // ============================================================
];

// ---- STATE ----
let activeWeekId = PRED_WEEKS[PRED_WEEKS.length - 1].id;

// ---- BUILD WEEK TABS ----
function buildTabs() {
  const wrap = document.getElementById('weekTabs');
  wrap.innerHTML = '';
  PRED_WEEKS.forEach(w => {
    const btn = document.createElement('button');
    btn.className = 'week-tab' + (w.id === activeWeekId ? ' active' : '');
    btn.textContent = w.label;
    btn.onclick = () => { activeWeekId = w.id; render(); };
    wrap.appendChild(btn);
  });
}

// ---- RENDER PREDICTION LIST ----
function buildPredList(entries, maxSlots, type) {
  const box = document.createElement('div');
  box.className = 'pred-box';

  const isEarly = type === 'early';
  box.innerHTML = `
    <div class="pred-box-header">
      <span class="pred-box-emoji">${isEarly ? '🌅' : '🌆'}</span>
      <div class="pred-box-info">
        <div class="pred-box-title">${isEarly ? 'Early Week Prediction' : 'Roaming Prediction'}</div>
        <div class="pred-box-sub">Top ${maxSlots} · ${isEarly ? 'Made before midweek' : 'More and more generated when charts get clearer'}</div>
      </div>
    </div>
    <div class="pred-box-meta">
      <span class="pred-meta-badge">${entries.length}/${maxSlots} filled</span>
    </div>
    <div class="pred-list" id="predList-${type}"></div>
  `;

  const list = box.querySelector(`#predList-${type}`);

  if (entries.length === 0) {
    list.innerHTML = `<div class="no-preds"><div class="emoji">⏳</div><h3>Not yet!</h3><p>Predictions for this type haven't been added yet.</p></div>`;
    return box;
  }

  for (let i = 0; i < maxSlots; i++) {
    const row = document.createElement('div');
    const n = i + 1;
    const topCls = n === 1 ? ' top1' : n === 2 ? ' top2' : n === 3 ? ' top3' : '';

    if (i < entries.length) {
      const e = entries[i];
      row.className = 'pred-row' + topCls;
      row.innerHTML = `
        <div class="pred-num">${n}</div>
        <img class="pred-cover" src="${e.c}" alt="">
        <div class="pred-info">
          <div class="pred-title">${e.t}</div>
          <div class="pred-artist">${e.a}</div>
          ${e.note ? `<div class="pred-note">"${e.note}"</div>` : ''}
        </div>
      `;
    } else {
      row.className = 'pred-row empty-slot';
      row.innerHTML = `
        <div class="pred-num">${n}</div>
        <img class="pred-cover" src="" alt="">
        <div class="pred-info"><div class="pred-title">TBC</div></div>
      `;
    }
    list.appendChild(row);
  }
  return box;
}

// ---- MAIN RENDER ----
function render() {
  buildTabs();
  const week = PRED_WEEKS.find(w => w.id === activeWeekId);
  if (!week) return;

  document.getElementById('sectionWeekLabel').textContent = 'Week of ' + week.label;

  const grid = document.getElementById('predsGrid');
  grid.innerHTML = '';
  grid.appendChild(buildPredList(week.early || [], 5, 'early'));
  grid.appendChild(buildPredList(week.late  || [], 10, 'late'));

  // comparison
  const compWrap = document.getElementById('comparisonWrap');
  const compBody = document.getElementById('comparisonBody');
  if (week.comparison) {
    compWrap.style.display = '';
    compBody.className = 'comparison-body';
    compBody.textContent = week.comparison;
  } else {
    compWrap.style.display = 'none';
  }
}

// ---- TICKER ----
const msgs=["Not officially affiliated with Talk Of The Charts","Estd. 2026","Reach out to add your chart!","Currently archiving ONE person's chart"];
const track=document.getElementById('ticker');
[...msgs,...msgs,...msgs,...msgs].forEach(m=>{const s=document.createElement('span');s.className='ticker-item';s.innerHTML=`<span class="ticker-dot"></span>${m}<span class="ticker-dot"></span>`;track.appendChild(s)});

render();
</script>
</body>
</html>
