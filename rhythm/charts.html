<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rhythm — Charts Archive</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
 
    body {
      font-family: 'Nunito', Arial, sans-serif;
      background-color: #ffe4f0;
      background-image:
        radial-gradient(circle, #ff9ed2 1px, transparent 1px),
        radial-gradient(circle, #ffb3e0 1px, transparent 1px);
      background-size: 28px 28px, 14px 14px;
      background-position: 0 0, 7px 7px;
      min-height: 100vh;
      color: #1a0533;
    }
 
    /* HEADER */
    header {
      background: #7c3aed;
      border-bottom: 4px solid #4c1d95;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
    }
    .back-link {
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #c4b5fd;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-link:hover { color: #fff; }
    .header-title {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: #fff;
    }
    .header-right { width: 80px; }
 
    /* MAIN LAYOUT: chart + calendar side by side */
    .page-body {
      max-width: 1060px;
      margin: 28px auto 60px;
      padding: 0 20px;
      display: grid;
      grid-template-columns: 1fr 230px;
      gap: 20px;
      align-items: start;
    }
 
    /* LEFT: topbar + chart */
    .chart-col {}
 
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      gap: 12px;
    }
 
    .week-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }
 
    .week-controls button {
      padding: 8px 16px;
      border: 3px solid #4c1d95;
      border-radius: 10px;
      background: #7c3aed;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 3px 3px 0 #4c1d95;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .week-controls button:hover:not(:disabled) {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #4c1d95;
    }
    .week-controls button:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #4c1d95;
    }
    .week-controls button:disabled {
      background: #c4b5fd;
      border-color: #a78bfa;
      box-shadow: 3px 3px 0 #a78bfa;
      cursor: not-allowed;
      opacity: 0.6;
    }
 
    .date-bubble {
      background: #4c1d95;
      color: #f0e6ff;
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
      padding: 8px 20px;
      border-radius: 999px;
      border: 3px solid #7c3aed;
    }
 
    /* CHART BOX */
    .chart-box {
      background: white;
      border: 3px solid #7c3aed;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 5px 5px 0 #4c1d95;
    }
 
    .chart-header {
      display: grid;
      grid-template-columns: 100px 64px 1fr 72px 72px;
      align-items: center;
      padding: 10px 14px;
      background: #7c3aed;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e9d5ff;
    }
    .chart-header div:nth-child(4),
    .chart-header div:nth-child(5) { text-align: center; }
 
    .row {
      display: grid;
      grid-template-columns: 100px 64px 1fr 72px 72px;
      align-items: center;
      padding: 9px 14px;
      border-bottom: 2px solid #f3e8ff;
      transition: background 0.12s;
    }
    .row:last-child { border-bottom: none; }
    .row:nth-child(odd)  { background: #faf5ff; }
    .row:nth-child(even) { background: #fff; }
    .row:hover { background: #f0e6ff; }
    .row.top1 { background: #fef9c3 !important; }
    .row.top2 { background: #f0fdf4 !important; }
    .row.top3 { background: #fff7ed !important; }
    .row.top1:hover { background: #fef08a !important; }
    .row.top2:hover { background: #dcfce7 !important; }
    .row.top3:hover { background: #ffedd5 !important; }
 
    .rank-cell {
      display: flex;
      align-items: center;
      gap: 4px;
    }
    .rank {
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: #4c1d95;
      min-width: 30px;
      text-align: right;
    }
    .row.top1 .rank { color: #854d0e; font-size: 22px; }
    .row.top2 .rank { color: #166534; font-size: 21px; }
    .row.top3 .rank { color: #9a3412; font-size: 21px; }
 
    .movement { font-size: 11px; font-weight: 800; white-space: nowrap; }
    .up   { color: #16a34a; }
    .down { color: #dc2626; }
    .new  { color: #7c3aed; }
    .same { color: #a78bfa; }
 
    .cover img {
      width: 46px; height: 46px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #ddd6fe;
      background: #f3e8ff;
      display: block;
    }
    .song { display: flex; flex-direction: column; gap: 2px; padding-left: 2px; }
    .title  { font-weight: 800; font-size: 14px; color: #1a0533; }
    .artist { font-size: 12px; font-weight: 600; color: #7c3aed; }
    .woc  { text-align: center; font-size: 13px; font-weight: 700; color: #6d28d9; }
    .peak { text-align: center; font-family: 'Fredoka One', cursive; font-size: 15px; color: #4c1d95; }
 
    /* 404 state */
    .not-found {
      padding: 60px 20px;
      text-align: center;
    }
    .not-found .emoji { font-size: 48px; margin-bottom: 16px; }
    .not-found h2 {
      font-family: 'Fredoka One', cursive;
      font-size: 26px;
      color: #4c1d95;
      margin-bottom: 8px;
    }
    .not-found p { font-size: 14px; font-weight: 600; color: #a78bfa; }
 
    /* RIGHT: CALENDAR */
    .calendar-col {
      position: sticky;
      top: 20px;
    }
 
    .calendar-box {
      background: white;
      border: 3px solid #7c3aed;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 4px 4px 0 #4c1d95;
    }
 
    .calendar-header {
      background: #7c3aed;
      padding: 10px 14px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
 
    .cal-nav {
      background: none;
      border: 2px solid #c4b5fd;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      padding: 2px 8px;
      font-family: 'Nunito', sans-serif;
      transition: background 0.15s;
    }
    .cal-nav:hover { background: rgba(255,255,255,0.15); }
 
    .cal-month-label {
      font-family: 'Fredoka One', cursive;
      font-size: 15px;
      color: #fff;
    }
 
    .calendar-grid {
      padding: 10px 10px 12px;
    }
 
    .cal-days-header {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
    }
    .cal-day-name {
      text-align: center;
      font-size: 10px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #a78bfa;
      padding: 4px 0;
    }
 
    .cal-cells {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
    }
 
    .cal-cell {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 700;
      color: #ccc;
      position: relative;
    }
 
    /* has a chart entry */
    .cal-cell.has-chart {
      background: #ede9fe;
      color: #4c1d95;
      cursor: pointer;
      border: 2px solid #c4b5fd;
      transition: background 0.12s, transform 0.1s;
    }
    .cal-cell.has-chart:hover {
      background: #ddd6fe;
      transform: scale(1.08);
    }
    .cal-cell.has-chart.active {
      background: #7c3aed;
      color: #fff;
      border-color: #4c1d95;
      box-shadow: 2px 2px 0 #4c1d95;
    }
 
    /* today marker */
    .cal-cell.today:not(.has-chart) {
      color: #d946ef;
      font-weight: 800;
    }
    .cal-cell.today::after {
      content: '';
      position: absolute;
      bottom: 3px;
      left: 50%;
      transform: translateX(-50%);
      width: 4px;
      height: 4px;
      background: #d946ef;
      border-radius: 50%;
    }
 
    /* empty spacer cells */
    .cal-cell.empty { pointer-events: none; }
 
    .calendar-legend {
      padding: 0 12px 12px;
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 700;
      color: #a78bfa;
    }
    .legend-dot {
      width: 10px; height: 10px;
      background: #ede9fe;
      border: 2px solid #c4b5fd;
      border-radius: 3px;
      flex-shrink: 0;
    }
 
 
    /* MOBILE */
    @media(max-width:700px){
      .page-body{grid-template-columns:1fr}
      .calendar-col{position:static}
      .chart-header{grid-template-columns:70px 50px 1fr 52px 52px;font-size:9px;padding:8px 10px}
      .row{grid-template-columns:70px 50px 1fr 52px 52px;padding:7px 10px}
      .rank{font-size:16px;min-width:22px}
      .cover img{width:38px;height:38px}
      .title{font-size:12px}
      .artist{font-size:11px}
      .woc,.peak{font-size:11px}
      .peak{font-size:12px}
      .topbar{flex-wrap:wrap;gap:8px}
      .date-bubble{font-size:13px;padding:6px 14px}
    }
    @media(max-width:400px){
      .chart-header div:nth-child(5),.row .peak{display:none}
      .chart-header{grid-template-columns:70px 50px 1fr 52px}
      .row{grid-template-columns:70px 50px 1fr 52px}
    }
 
    /* footer */
    footer {
      border-top: 3px solid #7c3aed;
      background: #4c1d95;
      padding: 16px 28px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c4b5fd;
    }
  </style>
</head>

// ============================================================
//  WEEKS REGISTRY
//  To add a new week: add ONE line here + the data array above.
//  Everything else (calendar, prev/next, WOC, peak) is automatic.
// ============================================================
const WEEKS = {
  "2026-05-17": week_2026_05_17,
  "2026-05-24": week_2026_05_24,
  "2026-05-31": week_2026_05_31,
  // "2026-06-07": week_2026_06_07,   ← uncomment + add data above to add week 4!
};
 
// ============================================================
//  ENGINE — nothing below needs touching to add new weeks
// ============================================================
 
// Sorted list of slugs (oldest first)
const sortedSlugs = Object.keys(WEEKS).sort();
const today = new Date();
 
// Parse slug from hash (#2026-05-17), falling back to most recent week
function getSlugFromURL() {
  const hash = window.location.hash.replace('#', '');
  if (hash && /^\d{4}-\d{2}-\d{2}$/.test(hash) && WEEKS[hash]) return hash;
  // Also support /rhythm/2026-05-17 path on a real server
  const parts = window.location.pathname.split('/').filter(Boolean);
  const last = parts[parts.length - 1];
  if (last && /^\d{4}-\d{2}-\d{2}$/.test(last) && WEEKS[last]) return last;
  return sortedSlugs[sortedSlugs.length - 1];
}
 
function slugToDate(slug) {
  const [y, m, d] = slug.split('-').map(Number);
  return new Date(y, m - 1, d);
}
 
function fmtSlug(slug) {
  const d = slugToDate(slug);
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: '2-digit' });
}
 
function navigateTo(slug) {
  // Hash navigation — works in previews, iframes, and real servers
  window.location.hash = slug;
  // hashchange fires automatically, but call directly too for same-hash clicks
  renderChart(slug);
  renderCalendar(slug);
}
 
// Handle browser back/forward and hash changes
window.addEventListener('hashchange', () => {
  const slug = getSlugFromURL();
  renderChart(slug);
  renderCalendar(slug);
});
 
// ---- CHART HELPERS ----
function songId(s) { return s.t + '||' + s.a; }
 
function posMap(list) {
  const m = {};
  list.forEach((s, i) => m[songId(s)] = i + 1);
  return m;
}
 
function movement(prevMap, key, cur) {
  if (!prevMap) return 'NEW';
  const x = prevMap[key];
  if (!x) return 'NEW';
  const d = x - cur;
  if (d === 0) return '—';
  return d > 0 ? '↑ ' + d : '↓ ' + Math.abs(d);
}
 
function wocAndPeak(key, slugIdx) {
  let woc = 0, peak = Infinity;
  for (let w = 0; w <= slugIdx; w++) {
    const pm = posMap(WEEKS[sortedSlugs[w]]);
    if (pm[key] !== undefined) {
      woc++;
      if (pm[key] < peak) peak = pm[key];
    }
  }
  return { woc, peak };
}
 
// ---- RENDER CHART ----
function renderChart(slug) {
  const slugIdx = sortedSlugs.indexOf(slug);
  const list = WEEKS[slug];
  const el = document.getElementById('chart');
 
  if (!list) {
    el.innerHTML = `<div class="not-found">
      <div class="emoji">📭</div>
      <h2>No chart for this week!</h2>
      <p>Check back when this week's chart drops.</p>
    </div>`;
    document.getElementById('dateLabel').innerText = slug;
    document.getElementById('prevBtn').disabled = true;
    document.getElementById('nextBtn').disabled = true;
    return;
  }
 
  document.getElementById('dateLabel').innerText = 'week of ' + fmtSlug(slug);
  document.getElementById('prevBtn').disabled = slugIdx <= 0;
  document.getElementById('nextBtn').disabled = slugIdx >= sortedSlugs.length - 1;
 
  const prevSlug = slugIdx > 0 ? sortedSlugs[slugIdx - 1] : null;
  const pm = prevSlug ? posMap(WEEKS[prevSlug]) : null;
 
  el.innerHTML = '';
  list.forEach((s, n) => {
    const key = songId(s);
    const cur = n + 1;
    let m = movement(pm, key, cur);
    let mvCls = 'movement';
    if (m.startsWith('↑')) mvCls += ' up';
    else if (m.startsWith('↓')) mvCls += ' down';
    else if (m === 'NEW') mvCls += ' new';
    else mvCls += ' same';
 
    const { woc, peak } = wocAndPeak(key, slugIdx);
    const topCls = cur === 1 ? ' top1' : cur === 2 ? ' top2' : cur === 3 ? ' top3' : '';
 
    const row = document.createElement('div');
    row.className = 'row' + topCls;
    row.innerHTML = `
      <div class="rank-cell">
        <div class="rank">${cur}</div>
        <div class="${mvCls}">${m}</div>
      </div>
      <div class="cover"><img src="${s.c}" alt=""></div>
      <div class="song">
        <div class="title">${s.t}</div>
        <div class="artist">${s.a}</div>
      </div>
      <div class="woc">${woc}</div>
      <div class="peak">${peak}</div>
    `;
    el.appendChild(row);
  });
}
 
function navWeek(dir) {
  const cur = getSlugFromURL();
  const idx = sortedSlugs.indexOf(cur);
  const next = sortedSlugs[idx + dir];
  if (next) navigateTo(next);
}
 
// ---- CALENDAR ----
const MONTH_NAMES = ['January','February','March','April','May','June',
                     'July','August','September','October','November','December'];
 
let calYear, calMonth;
 
function initCal(slug) {
  const d = slugToDate(slug);
  calYear = d.getFullYear();
  calMonth = d.getMonth();
}
 
function calPrev() { calMonth--; if (calMonth < 0) { calMonth = 11; calYear--; } renderCalendar(getSlugFromURL()); }
function calNext() { calMonth++; if (calMonth > 11) { calMonth = 0;  calYear++; } renderCalendar(getSlugFromURL()); }
 
function renderCalendar(activeSlug) {
  document.getElementById('calMonthLabel').innerText = MONTH_NAMES[calMonth] + ' ' + calYear;
 
  // build set of chart dates for quick lookup
  const chartDates = new Set(sortedSlugs);
 
  const firstDay = new Date(calYear, calMonth, 1);
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  // Monday=0 offset
  let startOffset = firstDay.getDay() - 1;
  if (startOffset < 0) startOffset = 6;
 
  const cells = document.getElementById('calCells');
  cells.innerHTML = '';
 
  // blank spacers
  for (let s = 0; s < startOffset; s++) {
    const sp = document.createElement('div');
    sp.className = 'cal-cell empty';
    cells.appendChild(sp);
  }
 
  for (let d = 1; d <= daysInMonth; d++) {
    const cell = document.createElement('div');
    const mm = String(calMonth + 1).padStart(2, '0');
    const dd = String(d).padStart(2, '0');
    const slug = `${calYear}-${mm}-${dd}`;
 
    const isToday = (today.getFullYear() === calYear && today.getMonth() === calMonth && today.getDate() === d);
    const hasChart = chartDates.has(slug);
    const isActive = slug === activeSlug;
 
    let cls = 'cal-cell';
    if (hasChart) cls += ' has-chart';
    if (isToday)  cls += ' today';
    if (isActive) cls += ' active';
 
    cell.className = cls;
    cell.textContent = d;
 
    if (hasChart) {
      cell.title = 'Chart: ' + fmtSlug(slug);
      cell.addEventListener('click', () => navigateTo(slug));
    }
 
    cells.appendChild(cell);
  }
}
 
// ---- INIT ----
const initSlug = getSlugFromURL();
initCal(initSlug);
renderChart(initSlug);
renderCalendar(initSlug);
