<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Rhythm Charts</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Nunito', Arial, sans-serif;
      background-color: #ffe4f0;
      background-image:
        radial-gradient(circle, #ff9ed2 1px, transparent 1px),
        radial-gradient(circle, #ffb3e0 1px, transparent 1px);
      background-size: 28px 28px, 14px 14px;
      background-position: 0 0, 7px 7px;
      min-height: 100vh;
      color: #1a0533;
    }

    /* HEADER */
    header {
      background: #7c3aed;
      border-bottom: 4px solid #4c1d95;
      padding: 0 28px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 62px;
    }

    .back-link {
      font-family: 'Fredoka One', cursive;
      font-size: 14px;
      color: #c4b5fd;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .back-link:hover { color: #fff; }

    .header-title {
      font-family: 'Fredoka One', cursive;
      font-size: 22px;
      color: #fff;
      letter-spacing: 0.5px;
    }

    .header-right { width: 80px; }

    /* TOPBAR */
    .topbar {
      max-width: 860px;
      margin: 24px auto 16px;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .week-controls {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .week-controls button {
      padding: 8px 16px;
      border: 3px solid #4c1d95;
      border-radius: 10px;
      background: #7c3aed;
      color: white;
      font-family: 'Nunito', sans-serif;
      font-size: 13px;
      font-weight: 800;
      cursor: pointer;
      box-shadow: 3px 3px 0 #4c1d95;
      transition: transform 0.1s, box-shadow 0.1s;
    }
    .week-controls button:hover:not(:disabled) {
      transform: translate(-1px, -1px);
      box-shadow: 4px 4px 0 #4c1d95;
    }
    .week-controls button:active:not(:disabled) {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0 #4c1d95;
    }
    .week-controls button:disabled {
      background: #c4b5fd;
      border-color: #a78bfa;
      box-shadow: 3px 3px 0 #a78bfa;
      cursor: not-allowed;
      opacity: 0.6;
    }

    .date-bubble {
      background: #4c1d95;
      color: #f0e6ff;
      font-family: 'Fredoka One', cursive;
      font-size: 16px;
      padding: 8px 20px;
      border-radius: 999px;
      border: 3px solid #7c3aed;
      letter-spacing: 0.5px;
    }

    /* CHART CONTAINER */
    .container {
      max-width: 860px;
      margin: 0 auto 50px;
      padding: 0 20px;
    }

    .chart-box {
      background: white;
      border: 3px solid #7c3aed;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 5px 5px 0 #4c1d95;
    }

    /* HEADER ROW */
    .chart-header {
      display: grid;
      grid-template-columns: 100px 64px 1fr 72px 72px;
      align-items: center;
      padding: 10px 14px;
      background: #7c3aed;
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #e9d5ff;
      gap: 0;
    }

    .chart-header div:last-child,
    .chart-header div:nth-child(4) {
      text-align: center;
    }

    /* ROWS */
    .row {
      display: grid;
      grid-template-columns: 100px 64px 1fr 72px 72px;
      align-items: center;
      padding: 9px 14px;
      border-bottom: 2px solid #f3e8ff;
      transition: background 0.12s;
    }

    .row:last-child { border-bottom: none; }

    .row:nth-child(odd) { background: #faf5ff; }
    .row:nth-child(even) { background: #fff; }
    .row:hover { background: #f0e6ff; }

    /* top 3 highlight */
    .row.top1 { background: #fef9c3 !important; }
    .row.top2 { background: #f0fdf4 !important; }
    .row.top3 { background: #fff7ed !important; }
    .row.top1:hover { background: #fef08a !important; }
    .row.top2:hover { background: #dcfce7 !important; }
    .row.top3:hover { background: #ffedd5 !important; }

    /* rank cell */
    .rank-cell {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .rank {
      font-family: 'Fredoka One', cursive;
      font-size: 20px;
      color: #4c1d95;
      min-width: 30px;
      text-align: right;
    }

    .row.top1 .rank { color: #854d0e; font-size: 22px; }
    .row.top2 .rank { color: #166534; font-size: 21px; }
    .row.top3 .rank { color: #9a3412; font-size: 21px; }

    .movement {
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
      line-height: 1;
    }
    .up   { color: #16a34a; }
    .down { color: #dc2626; }
    .new  { color: #7c3aed; }
    .same { color: #a78bfa; }

    /* cover */
    .cover img {
      width: 46px;
      height: 46px;
      object-fit: cover;
      border-radius: 8px;
      border: 2px solid #ddd6fe;
      background: #f3e8ff;
      display: block;
    }

    /* song info */
    .song { display: flex; flex-direction: column; gap: 2px; padding-left: 2px; }
    .title  { font-weight: 800; font-size: 14px; color: #1a0533; }
    .artist { font-size: 12px; font-weight: 600; color: #7c3aed; }

    /* woc / peak */
    .woc, .peak {
      text-align: center;
      font-size: 13px;
      font-weight: 700;
      color: #6d28d9;
    }
    .peak { color: #4c1d95; font-family: 'Fredoka One', cursive; font-size: 15px; }

    /* footer */
    footer {
      border-top: 3px solid #7c3aed;
      background: #4c1d95;
      padding: 14px 28px;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #c4b5fd;
    }
  </style>
</head>

/* ========================= */

const data = {
  "17/05/26": week17,
  "24/05/26": week24,
  "31/05/26": week31
};

function id(s) { return s.t + "||" + s.a; }

function pos(list) {
  const m = {};
  list.forEach((s, i) => m[id(s)] = i + 1);
  return m;
}

function move(prevMap, key, currentPos) {
  if (!prevMap) return "NEW";
  const x = prevMap[key];
  if (!x) return "NEW";
  const d = x - currentPos;
  if (d === 0) return "—";
  return d > 0 ? "↑ " + d : "↓ " + Math.abs(d);
}

function wocAndPeak(key, weekIdx) {
  let woc = 0;
  let peak = Infinity;
  for (let w = 0; w <= weekIdx; w++) {
    const list = data[weeks[w]];
    const pMap = pos(list);
    if (pMap[key] !== undefined) {
      woc++;
      if (pMap[key] < peak) peak = pMap[key];
    }
  }
  return { woc, peak };
}

let i = 2;

function render() {
  const w = weeks[i];
  document.getElementById("dateLabel").innerText = "week of " + w;
  document.getElementById("prevBtn").disabled = i === 0;
  document.getElementById("nextBtn").disabled = i === weeks.length - 1;

  const el = document.getElementById("chart");
  el.innerHTML = "";

  const list = data[w];
  const prev = i > 0 ? data[weeks[i - 1]] : null;
  const pm = prev ? pos(prev) : null;

  for (let n = 0; n < list.length; n++) {
    const s = list[n];
    const key = id(s);
    const currentPos = n + 1;

    let m = move(pm, key, currentPos);
    let mvCls = "movement";
    if (m.startsWith("↑")) mvCls += " up";
    else if (m.startsWith("↓")) mvCls += " down";
    else if (m === "NEW") mvCls += " new";
    else mvCls += " same";

    const { woc, peak } = wocAndPeak(key, i);

    const row = document.createElement("div");
    row.className = "row" + (currentPos === 1 ? " top1" : currentPos === 2 ? " top2" : currentPos === 3 ? " top3" : "");
    row.innerHTML = `
      <div class="rank-cell">
        <div class="rank">${currentPos}</div>
        <div class="${mvCls}">${m}</div>
      </div>
      <div class="cover"><img src="${s.c}" alt=""></div>
      <div class="song">
        <div class="title">${s.t}</div>
        <div class="artist">${s.a}</div>
      </div>
      <div class="woc">${woc}</div>
      <div class="peak">${peak}</div>
    `;
    el.appendChild(row);
  }
}

function changeWeek(d) { i += d; render(); }
render();
</script>
