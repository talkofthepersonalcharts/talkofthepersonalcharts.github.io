<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>rhythm charts</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
    }
    header {
      background: #111;
      color: white;
      padding: 18px;
      font-size: 20px;
      font-weight: bold;
    }
    .topbar {
      display: flex;
      justify-content: space-between;
      max-width: 1100px;
      margin: 10px auto;
      padding: 10px;
    }
    .week-controls button {
      padding: 8px 12px;
      border: none;
      background: #111;
      color: white;
      cursor: pointer;
    }
    .week-controls button:disabled {
      background: #777;
    }
    .date {
      font-weight: bold;
      font-size: 18px;
    }
    .container {
      max-width: 1100px;
      margin: 0 auto 40px;
      background: white;
    }

    /* 6 columns: rank+move | cover | song | woc | peak | (spacer removed) */
    .chart-header, .row {
      display: grid;
      grid-template-columns: 90px 60px 1fr 70px 70px;
      align-items: center;
    }
    .chart-header {
      padding: 10px;
      background: #eaeaea;
      font-size: 12px;
      font-weight: bold;
    }
    .row {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }

    /* Rank cell: position number + movement arrow side by side */
    .rank-cell {
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .rank {
      font-weight: bold;
      font-size: 18px;
      min-width: 28px;
      text-align: right;
    }
    .movement {
      font-weight: bold;
      font-size: 12px;
      white-space: nowrap;
    }
    .up   { color: green; }
    .down { color: red; }
    .new  { color: blue; }
    .same { color: #999; }

    .cover img {
      width: 50px;
      height: 50px;
      object-fit: cover;
      border-radius: 4px;
      background: #ddd;
    }
    .song {
      display: flex;
      flex-direction: column;
    }
    .title  { font-weight: bold; }
    .artist { font-size: 13px; color: #666; }

    .woc, .peak {
      text-align: center;
      font-size: 13px;
      color: #333;
    }
    .peak { font-weight: bold; }
  </style>
</head>

const data = {
  "17/05/26": week17,
  "24/05/26": week24,
  "31/05/26": week31
};

function id(s) { return s.t + "||" + s.a; }

/* Build a position map {songId -> position (1-based)} for a given week list */
function pos(list) {
  const m = {};
  list.forEach((s, i) => m[id(s)] = i + 1);
  return m;
}

/* Movement arrow: compare previous week's position to current */
function move(prevMap, key, currentPos) {
  if (!prevMap) return "NEW";
  const x = prevMap[key];
  if (!x) return "NEW";
  const d = x - currentPos;
  if (d === 0) return "—";
  return d > 0 ? "↑ " + d : "↓ " + Math.abs(d);
}

/* For a given song key and current week index (0-based),
   look ONLY at weeks[0..weekIdx] to compute:
   - woc: how many of those weeks the song appeared in
   - peak: best (lowest number) position across those weeks */
function wocAndPeak(key, weekIdx) {
  let woc = 0;
  let peak = Infinity;
  for (let w = 0; w <= weekIdx; w++) {
    const list = data[weeks[w]];
    const pMap = pos(list);
    if (pMap[key] !== undefined) {
      woc++;
      if (pMap[key] < peak) peak = pMap[key];
    }
  }
  return { woc, peak };
}

let i = 2; // default to most recent week

function render() {
  const w = weeks[i];
  document.getElementById("dateLabel").innerText = w;
  document.getElementById("prevBtn").disabled = i === 0;
  document.getElementById("nextBtn").disabled = i === weeks.length - 1;

  const el = document.getElementById("chart");
  el.innerHTML = "";

  const list = data[w];
  const prev = i > 0 ? data[weeks[i - 1]] : null;
  const pm = prev ? pos(prev) : null;

  for (let n = 0; n < list.length; n++) {
    const s = list[n];
    const key = id(s);
    const currentPos = n + 1;

    // Movement
    let m = move(pm, key, currentPos);
    let mvCls = "movement";
    if (m.startsWith("↑")) mvCls += " up";
    else if (m.startsWith("↓")) mvCls += " down";
    else if (m === "NEW") mvCls += " new";
    else mvCls += " same";

    // WOC + Peak (no look-ahead)
    const { woc, peak } = wocAndPeak(key, i);

    const row = document.createElement("div");
    row.className = "row";
    row.innerHTML = `
      <div class="rank-cell">
        <div class="rank">${currentPos}</div>
        <div class="${mvCls}">${m}</div>
      </div>
      <div class="cover"><img src="${s.c}" alt=""></div>
      <div class="song">
        <div class="title">${s.t}</div>
        <div class="artist">${s.a}</div>
      </div>
      <div class="woc">${woc}</div>
      <div class="peak">${peak}</div>
    `;
    el.appendChild(row);
  }
}

function changeWeek(d) { i += d; render(); }
render();
</script>
</body>
</html>
