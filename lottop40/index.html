<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Rhythm — Talk of the Personal Charts</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background-color:#ffe4f0;background-image:radial-gradient(circle,#ff9ed2 1px,transparent 1px),radial-gradient(circle,#ffb3e0 1px,transparent 1px);background-size:28px 28px,14px 14px;background-position:0 0,7px 7px;min-height:100vh;color:#1a0533}
header{background:#7c3aed;border-bottom:4px solid #4c1d95;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px}
.back-link{font-family:'Fredoka One',cursive;font-size:14px;color:#c4b5fd;text-decoration:none;display:flex;align-items:center;gap:6px}
.back-link:hover{color:#fff}
.header-title{font-family:'Fredoka One',cursive;font-size:20px;color:#fff}
.header-right{width:80px}
.ticker-wrap{background:#4c1d95;border-bottom:3px solid #3b0764;overflow:hidden;white-space:nowrap;padding:7px 0;position:relative}
.ticker-wrap::before,.ticker-wrap::after{content:'';position:absolute;top:0;bottom:0;width:50px;z-index:2;pointer-events:none}
.ticker-wrap::before{left:0;background:linear-gradient(to right,#4c1d95,transparent)}
.ticker-wrap::after{right:0;background:linear-gradient(to left,#4c1d95,transparent)}
.ticker-track{display:inline-flex;animation:ticker 30s linear infinite}
.ticker-track:hover{animation-play-state:paused}
@keyframes ticker{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.ticker-item{display:inline-flex;align-items:center;gap:10px;padding:0 28px;font-size:12px;font-weight:700;letter-spacing:.06em;color:#e9d5ff;text-transform:uppercase;white-space:nowrap}
.ticker-dot{width:5px;height:5px;border-radius:50%;background:#c084fc;flex-shrink:0}
 
/* PROFILE HERO */
.profile-hero{text-align:center;padding:40px 20px 32px}
.profile-avatar{width:90px;height:90px;border-radius:20px;border:4px solid #7c3aed;box-shadow:4px 4px 0 #4c1d95;object-fit:cover;background:#f3e8ff;margin:0 auto 16px}
.profile-name{font-family:'Fredoka One',cursive;font-size:clamp(28px,5vw,44px);color:#4c1d95;text-shadow:3px 3px 0 #c084fc;margin-bottom:6px}
.profile-sub{font-size:13px;font-weight:600;color:#7c3aed}
.profile-badges{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:12px}
.badge{background:#fff;border:2px solid #c4b5fd;border-radius:999px;padding:4px 12px;font-size:11px;font-weight:800;color:#4c1d95;text-transform:uppercase;letter-spacing:.06em}
 
/* NAV CARDS */
.section-label{max-width:700px;margin:0 auto 14px;padding:0 20px;display:flex;align-items:center;gap:12px}
.section-label span{font-family:'Fredoka One',cursive;font-size:18px;color:#7c3aed;white-space:nowrap}
.section-line{flex:1;height:2px;background:repeating-linear-gradient(90deg,#c084fc 0,#c084fc 6px,transparent 6px,transparent 12px)}
.nav-wrap{max-width:700px;margin:0 auto 60px;padding:0 20px;display:flex;flex-direction:column;gap:14px}
 
.nav-card{background:#fff;border:3px solid #7c3aed;border-radius:16px;padding:20px 22px;text-decoration:none;color:inherit;display:flex;align-items:center;gap:18px;box-shadow:4px 4px 0 #4c1d95;transition:transform .1s,box-shadow .1s}
.nav-card:hover{transform:translate(-2px,-2px);box-shadow:6px 6px 0 #4c1d95}
.nav-card:active{transform:translate(2px,2px);box-shadow:2px 2px 0 #4c1d95}
.nav-emoji{font-size:32px;line-height:1;flex-shrink:0}
.nav-text{flex:1;min-width:0}
.nav-title{font-family:'Fredoka One',cursive;font-size:20px;color:#4c1d95;margin-bottom:3px}
.nav-sub{font-size:13px;font-weight:600;color:#a78bfa}
.nav-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.nav-tag{background:#f3e8ff;border:2px solid #ddd6fe;border-radius:999px;padding:2px 10px;font-size:11px;font-weight:800;color:#6d28d9}
.nav-tag.hot{background:#fef3c7;border-color:#f59e0b;color:#92400e}
.nav-arrow{width:32px;height:32px;background:#7c3aed;border-radius:50%;border:2px solid #4c1d95;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.nav-arrow svg{width:14px;height:14px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
 
footer{border-top:3px solid #7c3aed;background:#4c1d95;padding:14px 28px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#c4b5fd}
</style>
</head>
<body>
<header>
  <a class="back-link" href="../index.html">← back</a>
  <div class="header-title">LotTop40</div>
  <div class="header-right"></div>
</header>
<div class="ticker-wrap"><div class="ticker-track" id="ticker"></div></div>
 
<div class="profile-hero">
  <img class="profile-avatar" src="../lottop40.jpg" alt="LotTop40">
  <div class="profile-name">LotTop40</div>
  <div class="profile-sub">Personal music charts — tracked every week</div>
  <div class="profile-badges">
    <span class="badge">🗓 22 weeks archived so far</span>
  </div>
</div>
 
<div class="section-label"><span>Pages</span><div class="section-line"></div></div>
 
<div class="nav-wrap">
 
  <a class="nav-card" href="charts.html">
    <span class="nav-emoji">📊</span>
    <div class="nav-text">
      <div class="nav-title">Charts</div>
      <div class="nav-sub">Weekly ranked chart archive</div>
      <div class="nav-meta">
        <span class="nav-tag">22 weeks</span>
        <span class="nav-tag">Latest: 29 May 2026</span>
      </div>
    </div>
    <div class="nav-arrow"><svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg></div>
  </a>
 

 
</div>
 
<footer>Talk of the Personal Charts &nbsp;·&nbsp; Updated Every Week</footer>
<script>
const msgs=["Not officially affiliated with Talk Of The Charts","Estd. 2026","Reach out to add your chart!","Currently archiving TWO people's chart"];
const track=document.getElementById('ticker');
[...msgs,...msgs,...msgs,...msgs].forEach(m=>{const s=document.createElement('span');s.className='ticker-item';s.innerHTML=`<span class="ticker-dot"></span>${m}<span class="ticker-dot"></span>`;track.appendChild(s)});
</script>
</body>
</html>
