<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',Arial,sans-serif;background-color:#ffe4f0;background-image:radial-gradient(circle,#ff9ed2 1px,transparent 1px),radial-gradient(circle,#ffb3e0 1px,transparent 1px);background-size:28px 28px,14px 14px;background-position:0 0,7px 7px;min-height:100vh;color:#1a0533}
header{background:#7c3aed;border-bottom:4px solid #4c1d95;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:62px}
.back-link{font-family:'Fredoka One',cursive;font-size:14px;color:#c4b5fd;text-decoration:none;display:flex;align-items:center;gap:6px}
.back-link:hover{color:#fff}
.header-title{font-family:'Fredoka One',cursive;font-size:20px;color:#fff}
.header-right{width:80px}
.page-body{max-width:1060px;margin:24px auto 60px;padding:0 20px;display:grid;grid-template-columns:1fr 230px;gap:20px;align-items:start}
@media(max-width:720px){.page-body{grid-template-columns:1fr}.calendar-col{position:static!important}}
.topbar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;gap:12px;flex-wrap:wrap}
.week-controls{display:flex;align-items:center;gap:8px}
.week-controls button{padding:8px 16px;border:3px solid #4c1d95;border-radius:10px;background:#7c3aed;color:white;font-family:'Nunito',sans-serif;font-size:13px;font-weight:800;cursor:pointer;box-shadow:3px 3px 0 #4c1d95;transition:transform .1s,box-shadow .1s}
.week-controls button:hover:not(:disabled){transform:translate(-1px,-1px);box-shadow:4px 4px 0 #4c1d95}
.week-controls button:active:not(:disabled){transform:translate(2px,2px);box-shadow:1px 1px 0 #4c1d95}
.week-controls button:disabled{background:#c4b5fd;border-color:#a78bfa;box-shadow:3px 3px 0 #a78bfa;cursor:not-allowed;opacity:.6}
.date-bubble{background:#4c1d95;color:#f0e6ff;font-family:'Fredoka One',cursive;font-size:14px;padding:7px 18px;border-radius:999px;border:3px solid #7c3aed;text-align:center}
.chart-box{background:white;border:3px solid #7c3aed;border-radius:16px;overflow:hidden;box-shadow:5px 5px 0 #4c1d95}
.tip-bar{background:#f3e8ff;border-bottom:2px solid #ddd6fe;padding:8px 14px;font-size:12px;font-weight:700;color:#4c1d95;display:flex;align-items:center;gap:8px}
.tip-bar span{color:#7c3aed}
.chart-header{display:grid;grid-template-columns:90px 58px 1fr 62px 62px;align-items:center;padding:9px 14px;background:#7c3aed;font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;color:#e9d5ff}
.chart-header div:nth-child(4),.chart-header div:nth-child(5){text-align:center}
.row{display:grid;grid-template-columns:90px 58px 1fr 62px 62px;align-items:center;padding:8px 14px;border-bottom:2px solid #f3e8ff;transition:background .12s}
.row:last-child{border-bottom:none}
.row:nth-child(odd){background:#faf5ff}
.row:nth-child(even){background:#fff}
.row:hover{background:#f0e6ff}
.row.top1{background:#fef9c3!important}.row.top2{background:#f0fdf4!important}.row.top3{background:#fff7ed!important}
.row.top1:hover{background:#fef08a!important}.row.top2:hover{background:#dcfce7!important}.row.top3:hover{background:#ffedd5!important}
.rank-cell{display:flex;align-items:center;gap:4px}
.rank{font-family:'Fredoka One',cursive;font-size:19px;color:#4c1d95;min-width:28px;text-align:right}
.row.top1 .rank{color:#854d0e;font-size:21px}.row.top2 .rank{color:#166534;font-size:20px}.row.top3 .rank{color:#9a3412;font-size:20px}
.movement{font-size:11px;font-weight:800;white-space:nowrap}
.up{color:#16a34a}.down{color:#dc2626}.new{color:#7c3aed}.same{color:#a78bfa}
.cover{width:46px;height:46px;border-radius:8px;border:2px solid #ddd6fe;object-fit:cover;background:#f3e8ff;display:block;flex-shrink:0}
.song{display:flex;flex-direction:column;gap:1px;padding-left:2px;min-width:0}
.title{font-weight:800;font-size:13px;color:#1a0533;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.artist{font-size:11px;font-weight:600;color:#7c3aed;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.woc{text-align:center;font-size:12px;font-weight:700;color:#6d28d9}
.peak{text-align:center;font-family:'Fredoka One',cursive;font-size:14px;color:#4c1d95}
/* CALENDAR */
.calendar-col{position:sticky;top:20px}
.calendar-box{background:white;border:3px solid #7c3aed;border-radius:16px;overflow:hidden;box-shadow:4px 4px 0 #4c1d95}
.calendar-header{background:#7c3aed;padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.cal-nav{background:none;border:2px solid #c4b5fd;border-radius:8px;color:#fff;font-size:14px;font-weight:800;cursor:pointer;padding:2px 8px;font-family:'Nunito',sans-serif;transition:background .15s}
.cal-nav:hover{background:rgba(255,255,255,.15)}
.cal-month-label{font-family:'Fredoka One',cursive;font-size:15px;color:#fff}
.calendar-grid{padding:8px 8px 10px}
.cal-days-header{display:grid;grid-template-columns:repeat(7,1fr);margin-bottom:3px}
.cal-day-name{text-align:center;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;color:#a78bfa;padding:3px 0}
.cal-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-cell{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:7px;font-size:11px;font-weight:700;color:#ccc}
.cal-cell.has-chart{background:#ede9fe;color:#4c1d95;cursor:pointer;border:2px solid #c4b5fd;transition:background .12s,transform .1s}
.cal-cell.has-chart:hover{background:#ddd6fe;transform:scale(1.08)}
.cal-cell.has-chart.active{background:#7c3aed;color:#fff;border-color:#4c1d95;box-shadow:2px 2px 0 #4c1d95}
.cal-cell.today:not(.has-chart){color:#d946ef;font-weight:800}
.cal-cell.today::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;background:#d946ef;border-radius:50%}
.cal-cell{position:relative}
.calendar-legend{padding:0 10px 10px;display:flex;align-items:center;gap:6px;font-size:10px;font-weight:700;color:#a78bfa}
.legend-dot{width:10px;height:10px;background:#ede9fe;border:2px solid #c4b5fd;border-radius:3px;flex-shrink:0}
/* MOBILE */
@media(max-width:600px){
  .chart-header,.row{grid-template-columns:72px 46px 1fr 52px 52px;padding:7px 10px}
  .rank{font-size:16px;min-width:22px}
  .cover{width:38px;height:38px}
  .title{font-size:12px}.artist{font-size:10px}
  .woc,.peak{font-size:11px}
}
@media(max-width:400px){
  .chart-header div:nth-child(5),.row .peak{display:none}
  .chart-header,.row{grid-template-columns:72px 46px 1fr 52px}
}
footer{border-top:3px solid #7c3aed;background:#4c1d95;padding:14px 28px;text-align:center;font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:#c4b5fd}

// ---- IMAGE CACHE (iTunes API) ----
const imgCache = {};
const IMG_PLACEHOLDER = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" width="46" height="46"><rect width="46" height="46" rx="8" fill="%23ede9fe"/><text x="50%" y="55%" font-size="20" text-anchor="middle" dominant-baseline="middle">🎵</text></svg>';

async function getImg(artist, title) {
  const key = artist + '||' + title;
  if (imgCache[key]) return imgCache[key];
  imgCache[key] = IMG_PLACEHOLDER; // prevent duplicate fetches
  try {
    const q = encodeURIComponent(artist + ' ' + title);
    const r = await fetch(`https://itunes.apple.com/search?term=${q}&media=music&limit=1&entity=song`);
    const d = await r.json();
    if (d.results && d.results.length > 0) {
      const url = d.results[0].artworkUrl100.replace('100x100', '300x300');
      imgCache[key] = url;
    }
  } catch(e) {}
  return imgCache[key];
}

// ---- CORE ----
const sortedSlugs = Object.keys(WEEKS).sort();
const today = new Date();

function getSlugFromURL() {
  const hash = window.location.hash.replace('#','');
  if (hash && WEEKS[hash]) return hash;
  const parts = window.location.pathname.split('/').filter(Boolean);
  const last = parts[parts.length-1];
  if (last && WEEKS[last]) return last;
  return sortedSlugs[sortedSlugs.length-1];
}

function slugToDate(slug) {
  const [y,m,d] = slug.split('-').map(Number);
  return new Date(y, m-1, d);
}

function fmtSlug(slug) {
  return slugToDate(slug).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'2-digit'});
}

function navigateTo(slug) {
  window.location.hash = slug;
  renderChart(slug);
  renderCalendar(slug);
}

window.addEventListener('hashchange', () => {
  const s = getSlugFromURL();
  renderChart(s);
  renderCalendar(s);
});

function songId(e) { return e.a+'||'+e.t; }

function posMap(list) {
  const m={};
  list.forEach((e,i) => m[songId(e)] = i+1);
  return m;
}

function movStr(prevMap, key, cur) {
  if (!prevMap) return 'NEW';
  const x = prevMap[key];
  if (!x) return 'NEW';
  const d = x - cur;
  if (d===0) return '—';
  return d>0 ? '↑ '+d : '↓ '+Math.abs(d);
}

function wocAndPeak(key, slugIdx) {
  let woc=0, peak=Infinity;
  for (let w=0; w<=slugIdx; w++) {
    const pm = posMap(WEEKS[sortedSlugs[w]].entries);
    if (pm[key]!==undefined) { woc++; if(pm[key]<peak) peak=pm[key]; }
  }
  return {woc, peak};
}

function renderChart(slug) {
  const slugIdx = sortedSlugs.indexOf(slug);
  const week = WEEKS[slug];
  document.getElementById('prevBtn').disabled = slugIdx <= 0;
  document.getElementById('nextBtn').disabled = slugIdx >= sortedSlugs.length-1;
  document.getElementById('dateLabel').textContent = week.label;

  const tipBar = document.getElementById('tipBar');
  if (week.tip) {
    tipBar.style.display = '';
    tipBar.innerHTML = '🎵 <b>LotTip:</b> <span>' + week.tip + '</span>';
  } else {
    tipBar.style.display = 'none';
  }

  const prevSlug = slugIdx > 0 ? sortedSlugs[slugIdx-1] : null;
  const pm = prevSlug ? posMap(WEEKS[prevSlug].entries) : null;

  const el = document.getElementById('chart');
  el.innerHTML = '';

  week.entries.forEach((e, n) => {
    const key = songId(e);
    const cur = n+1;
    let m = movStr(pm, key, cur);
    let mvCls = 'movement';
    if (m.startsWith('↑')) mvCls+=' up';
    else if (m.startsWith('↓')) mvCls+=' down';
    else if (m==='NEW') mvCls+=' new';
    else mvCls+=' same';
    const {woc, peak} = wocAndPeak(key, slugIdx);
    const topCls = cur===1?' top1':cur===2?' top2':cur===3?' top3':'';
    const row = document.createElement('div');
    row.className = 'row'+topCls;

    const rankCell=document.createElement('div');rankCell.className='rank-cell';
    const rankEl=document.createElement('div');rankEl.className='rank';rankEl.textContent=cur;
    const movEl=document.createElement('div');movEl.className=mvCls;movEl.textContent=m;
    rankCell.appendChild(rankEl);rankCell.appendChild(movEl);

    const img=document.createElement('img');img.className='cover';img.src=IMG_PLACEHOLDER;img.alt='';
    img.dataset.artist=e.a;img.dataset.title=e.t;

    const songDiv=document.createElement('div');songDiv.className='song';
    const titleEl=document.createElement('div');titleEl.className='title';titleEl.textContent=e.t;
    const artistEl=document.createElement('div');artistEl.className='artist';artistEl.textContent=e.a;
    songDiv.appendChild(titleEl);songDiv.appendChild(artistEl);

    const wocEl=document.createElement('div');wocEl.className='woc';wocEl.textContent=woc;
    const peakEl=document.createElement('div');peakEl.className='peak';peakEl.textContent=peak;

    row.appendChild(rankCell);row.appendChild(img);row.appendChild(songDiv);
    row.appendChild(wocEl);row.appendChild(peakEl);
    el.appendChild(row);
  });

  // Lazy-load images via iTunes after render
  loadImages();
}

async function loadImages() {
  const imgs = document.querySelectorAll('img.cover[data-artist]');
  // batch in groups of 5 to avoid hammering the API
  for (let i=0; i<imgs.length; i+=5) {
    const batch = Array.from(imgs).slice(i, i+5);
    await Promise.all(batch.map(async img => {
      const url = await getImg(img.dataset.artist, img.dataset.title);
      img.src = url;
    }));
  }
}

function navWeek(dir) {
  const cur = getSlugFromURL();
  const idx = sortedSlugs.indexOf(cur);
  const next = sortedSlugs[idx+dir];
  if (next) navigateTo(next);
}

// ---- CALENDAR ----
const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
let calYear, calMonth;

function initCal(slug) {
  const d = slugToDate(slug);
  calYear = d.getFullYear();
  calMonth = d.getMonth();
}

function calPrev() { calMonth--; if(calMonth<0){calMonth=11;calYear--;} renderCalendar(getSlugFromURL()); }
function calNext() { calMonth++; if(calMonth>11){calMonth=0;calYear++;} renderCalendar(getSlugFromURL()); }

function renderCalendar(activeSlug) {
  document.getElementById('calMonthLabel').textContent = MONTHS[calMonth]+' '+calYear;
  const chartDates = new Set(sortedSlugs);
  const firstDay = new Date(calYear, calMonth, 1);
  const daysInMonth = new Date(calYear, calMonth+1, 0).getDate();
  let startOffset = firstDay.getDay()-1;
  if(startOffset<0) startOffset=6;
  const cells = document.getElementById('calCells');
  cells.innerHTML='';
  for(let s=0;s<startOffset;s++){const sp=document.createElement('div');sp.className='cal-cell empty';cells.appendChild(sp);}
  for(let d=1;d<=daysInMonth;d++){
    const cell=document.createElement('div');
    const mm=String(calMonth+1).padStart(2,'0');
    const dd=String(d).padStart(2,'0');
    const slug=`${calYear}-${mm}-${dd}`;
    const isToday=(today.getFullYear()===calYear&&today.getMonth()===calMonth&&today.getDate()===d);
    const hasChart=chartDates.has(slug);
    const isActive=slug===activeSlug;
    let cls='cal-cell';
    if(hasChart) cls+=' has-chart';
    if(isToday) cls+=' today';
    if(isActive) cls+=' active';
    cell.className=cls;
    cell.textContent=d;
    if(hasChart){cell.title=fmtSlug(slug);cell.addEventListener('click',()=>navigateTo(slug));}
    cells.appendChild(cell);
  }
}

const initSlug = getSlugFromURL();
initCal(initSlug);
renderChart(initSlug);
renderCalendar(initSlug);
</script>
